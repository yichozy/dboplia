name: Release DBoplia

on:
  release:
    types: [published]

jobs:
  build:
    name: Build DBoplia
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build DBoplia (Windows)
        if: runner.os == 'Windows'
        run: wails build -platform windows/amd64

      - name: Build DBoplia (macOS)
        if: runner.os == 'macOS'
        run: wails build -platform darwin/universal

      - name: Build DBoplia (Linux)
        if: runner.os == 'Linux'
        run: wails build -platform linux/amd64

      - name: Package macOS App
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          tar -czvf DBoplia-macos.tar.gz DBoplia.app/

      - name: Rename binaries
        shell: bash
        run: |
          cd build/bin
          if [ "${{ runner.os }}" = "Windows" ]; then
            mv DBoplia.exe DBoplia-windows.exe
          elif [ "${{ runner.os }}" = "Linux" ]; then
            mv DBoplia DBoplia-linux
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/DBoplia-macos.tar.gz
            build/bin/DBoplia-windows.exe
            build/bin/DBoplia-linux
