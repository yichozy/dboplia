name: Release DBoplia

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.get_tag.outputs.new_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get next tag
        id: get_tag
        run: |
          git fetch --tags origin || true
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          if [[ $LATEST_TAG =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR="${BASH_REMATCH[1]}"
            MINOR="${BASH_REMATCH[2]}"
            PATCH="${BASH_REMATCH[3]}"
          else
            MAJOR=0
            MINOR=0
            PATCH=0
          fi

          PATCH=$((PATCH + 1))
          
          if [ "$PATCH" -ge 10 ]; then
            MINOR=$((MINOR + 1))
            PATCH=0
          fi
          
          # Cascade minor bumps to major version
          if [ "$MINOR" -ge 10 ]; then
            MAJOR=$((MAJOR + 1))
            MINOR=0
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Update app.go version
        run: |
          sed -i 's/const AppVersion = "[^"]*"/const AppVersion = "'"${{ steps.get_tag.outputs.new_tag }}"'"/' app.go

      - name: Commit and push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app.go
          git commit -m "chore: bump version to ${{ steps.get_tag.outputs.new_tag }} [skip ci]" || true
          git tag ${{ steps.get_tag.outputs.new_tag }}
          git push origin main --tags

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.new_tag }}
          name: Release ${{ steps.get_tag.outputs.new_tag }}
          generate_release_notes: true

  build:
    name: Build DBoplia
    needs: bump-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-version.outputs.new_tag }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build DBoplia (Windows)
        if: runner.os == 'Windows'
        run: wails build -platform windows/amd64

      - name: Build DBoplia (macOS)
        if: runner.os == 'macOS'
        run: wails build -platform darwin/universal

      - name: Build DBoplia (Linux)
        if: runner.os == 'Linux'
        run: wails build -platform linux/amd64

      - name: Package binaries
        shell: bash
        run: |
          cd build/bin
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            mv DBoplia.exe DBoplia-windows.exe
          elif [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            tar -czvf DBoplia-linux.tar.gz DBoplia
          elif [ "${{ matrix.os }}" = "macos-latest" ]; then
            tar -czvf DBoplia-macos.tar.gz DBoplia.app/
          fi

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.new_tag }}
          files: build/bin/DBoplia-*
